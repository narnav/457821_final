        - id: ex_4_3
          name: While Loop Trace
          skills: [trace_variables, while_loops]
          instructions: |
            Trace through the while loop. For each iteration, note the value of `count` and what gets printed. Write the full output.
          starter_code: |
            count = 3
            while count > 0:
                print(count)
                count = count - 1
            print("Go!")
          expected_output: |
            3
            2
            1
            Go!

