version: "1.0"
track:
  id: python_basic
  name: Python Basics

modules:
  - id: module_1
    name: Thinking Like a Programmer
    order: 1

    exercise_pool:
      guided_practice:
        - id: ex_1_1
          name: Predict the Output
          skills: [predict_output, trace_code]
          instructions: |
            Read the code below carefully. Without running it, predict exactly what will be printed to the console.

            Type the expected output in the answer box and submit.
          starter_code: |
            print("Hello")
            print("World")
            print(2 + 3)
          expected_output: |
            Hello
            World
            5

        - id: ex_1_2
          name: Line by Line
          skills: [explain_code, read_before_write]
          answer_mode: code
          instructions: |
            Read the code below line by line. For each line, write a comment explaining what it does.

            Add a comment above each line using the # symbol.
          starter_code: |
            message = "Python"
            print(message)
            print(len(message))

        - id: ex_1_3
          name: Order Matters
          skills: [execution_order, predict_output]
          instructions: |
            The lines below will run top to bottom. Predict the output in order.

            Write each output value on its own line, exactly as Python would print it.
          starter_code: |
            x = 10
            print(x)
            x = 20
            print(x)
            print(x + 5)
          expected_output: |
            10
            20
            25

        - id: ex_1_4
          name: What Changed
          skills: [string_vs_expression, predict_output]
          instructions: |
            Look at the two print statements below. One prints a string, the other prints an expression.

            Predict the output of each line. Pay attention to the difference between quotes and no quotes.
          starter_code: |
            print("3 + 4")
            print(3 + 4)
          expected_output: |
            3 + 4
            7

      debugging:
        - id: ex_1_5
          name: Spot the Problem
          skills: [identify_syntax_error, explain_error]
          instructions: |
            The code below has a syntax error that prevents it from running.

            Find the error, fix it, and make sure the code prints the intended message.
          starter_code: |
            print("Welcome to Python!)

        - id: ex_1_6
          name: Missing Pieces
          skills: [identify_syntax_error, multiple_errors]
          instructions: |
            The code below has multiple syntax errors. Find and fix all of them.

            The intended behavior is to print two messages.
          starter_code: |
            print("Hello"
            print "Goodbye")

        - id: ex_1_7
          name: Wrong Output
          skills: [logic_error, string_vs_expression]
          instructions: |
            The code below runs without errors, but it doesn't produce the intended output.
            The programmer wanted to display the result of 10 + 5, not the literal text.

            Fix the code so it calculates and prints the correct number.
          starter_code: |
            print("10 + 5")

      independent_task:
        - id: ex_1_8
          name: Your First Program
          skills: [write_code, use_print]
          instructions: |
            Write a program that prints your name on the first line and your favorite color on the second line.

            Use two separate print() statements.
          starter_code: |
            # Write your program below

        - id: ex_1_9
          name: Simple Math Display
          skills: [write_code, arithmetic, use_print]
          instructions: |
            Write a program that prints the results of three calculations:
            - 15 + 27
            - 100 - 37
            - 8 * 6

            Each result should appear on its own line. Use print() with the actual math expressions (not pre-calculated numbers).
          starter_code: |
            # Print three calculations

        - id: ex_1_10
          name: Message Builder
          skills: [write_code, use_print, multi_line]
          instructions: |
            Write a program that prints a 3-line greeting card:

            Line 1: A greeting (e.g., "Happy Birthday!")
            Line 2: A short personal message
            Line 3: Your name

            Use one print() call per line.
          starter_code: |
            # Build your greeting card

  - id: module_2
    name: Variables and Data Types
    order: 2

    exercise_pool:
      guided_practice:
        - id: ex_2_1
          name: Trace the Variable
          skills: [trace_values, reassignment]
          instructions: |
            Trace the value of the variable through each step. After reading the code, predict what the final print() will output.

            Write the expected output in the answer box.
          starter_code: |
            score = 0
            score = score + 10
            score = score + 5
            print(score)
          expected_output: "15"

        - id: ex_2_2
          name: What Type Is It
          skills: [identify_types, type_awareness]
          answer_mode: code
          instructions: |
            For each variable below, write a comment stating its type (int, float, str, or bool).

            Add your comment after each assignment line.
          starter_code: |
            a = 42
            b = "hello"
            c = 3.14
            d = True

        - id: ex_2_3
          name: Name That Variable
          skills: [naming_conventions, readability]
          answer_mode: code
          instructions: |
            The code below uses poor variable names. Rename the variables to be descriptive and follow Python naming conventions (snake_case).

            Keep the logic exactly the same — only change the variable names.
          starter_code: |
            x = "Alice"
            y = 25
            z = x + " is " + str(y) + " years old"
            print(z)

        - id: ex_2_4
          name: Predict the Swap
          skills: [trace_values, reassignment]
          instructions: |
            This code attempts to swap the values of two variables. Trace through it carefully and predict what will be printed.

            Does the swap work correctly? Write the output.
          starter_code: |
            a = "left"
            b = "right"
            temp = a
            a = b
            b = temp
            print(a, b)
          expected_output: "right left"

        - id: ex_2_5
          name: String or Number
          skills: [type_awareness, predict_output]
          instructions: |
            Predict the output of each print statement. Pay close attention to whether values are strings or numbers — the + operator behaves differently for each.
          starter_code: |
            x = "3"
            y = "4"
            print(x + y)
            a = 3
            b = 4
            print(a + b)
          expected_output: |
            34
            7

      debugging:
        - id: ex_2_6
          name: Type Mismatch
          skills: [type_errors, fix_bugs]
          instructions: |
            The code below crashes with a TypeError. Find the type mismatch and fix it so the message prints correctly.

            The output should read: "You have 5 items"
          starter_code: |
            count = 5
            message = "You have " + count + " items"
            print(message)

        - id: ex_2_7
          name: Overwritten Variable
          skills: [trace_values, identify_bugs]
          instructions: |
            The programmer intended to print both the width and height, but something went wrong. Find and fix the bug.

            Expected output should show width=10 and height=20.
          starter_code: |
            width = 10
            height = 20
            width = height
            print("Width:", width)
            print("Height:", height)

        - id: ex_2_8
          name: Unclear Names
          skills: [naming_conventions, refactoring]
          instructions: |
            The code works but is hard to understand because of poor variable names. Refactor the variable names to be clear and descriptive.

            Do not change what the code does — only rename variables.
          starter_code: |
            a = 50
            b = 8
            c = a * b
            d = c * 0.1
            e = c + d
            print(e)

        - id: ex_2_9
          name: Broken Calculation
          skills: [arithmetic, operator_precedence]
          instructions: |
            The code should calculate the average of three test scores, but the result is wrong.

            Fix the calculation so it correctly computes the average (should be 80.0).
          starter_code: |
            score1 = 70
            score2 = 85
            score3 = 85
            average = score1 + score2 + score3 / 3
            print(average)

      independent_task:
        - id: ex_2_10
          name: Temperature Converter
          skills: [arithmetic, variables, formulas]
          instructions: |
            Write a program that converts a temperature from Celsius to Fahrenheit.

            1. Create a variable celsius set to 25
            2. Calculate fahrenheit using the formula: F = C * 9/5 + 32
            3. Print the result in a readable format like: "25°C is 77.0°F"
          starter_code: |
            # Temperature converter

        - id: ex_2_11
          name: Rectangle Calculator
          skills: [arithmetic, variables, formulas]
          instructions: |
            Write a program that calculates the area and perimeter of a rectangle.

            1. Create variables for width (8) and height (5)
            2. Calculate area (width * height) and perimeter (2 * (width + height))
            3. Print both results with labels
          starter_code: |
            # Rectangle calculator

        - id: ex_2_12
          name: Personal Info Card
          skills: [variables, data_types, print]
          instructions: |
            Write a program that stores personal information in variables and displays it as a formatted card.

            Store: name (string), age (integer), city (string), is_student (boolean).
            Print each piece of information on its own line with a label.
          starter_code: |
            # Personal info card

  - id: module_3
    name: Conditions and Logic
    order: 3

    exercise_pool:
      guided_practice:
        - id: ex_3_1
          name: Which Branch Runs
          skills: [branch_tracing, conditionals]
          instructions: |
            Read the code below and predict which branch will execute. Write the exact output.
          starter_code: |
            temperature = 35
            if temperature > 30:
                print("It's hot outside!")
            elif temperature > 20:
                print("Nice weather.")
            else:
                print("It's cold.")
          expected_output: "It's hot outside!"

        - id: ex_3_2
          name: True or False
          skills: [boolean_evaluation, comparison_operators]
          instructions: |
            For each expression below, predict whether it evaluates to True or False. Write the exact output, one value per line.
          starter_code: |
            print(5 > 3)
            print(10 == "10")
            print(7 != 7)
            print(3 <= 3)
          expected_output: |
            True
            False
            False
            True

        - id: ex_3_3
          name: Combine Conditions
          skills: [logical_operators, boolean_logic]
          instructions: |
            Predict the output of each print statement. Think carefully about how `and`, `or`, and `not` combine the conditions.
          starter_code: |
            age = 20
            has_ticket = True
            print(age >= 18 and has_ticket)
            print(age < 18 or has_ticket)
            print(not has_ticket)
          expected_output: |
            True
            True
            False

        - id: ex_3_4
          name: Complete the Condition
          skills: [write_conditions, conditionals]
          answer_mode: code
          instructions: |
            The if/elif/else structure below is missing its conditions. Fill in the blanks so the code correctly classifies the number as positive, negative, or zero.
          starter_code: |
            number = -7
            if ___:
                print("Positive")
            elif ___:
                print("Negative")
            else:
                print("Zero")

      debugging:
        - id: ex_3_5
          name: Assignment vs Comparison
          skills: [syntax_errors, comparison_operators]
          instructions: |
            The code below has a common bug: using = (assignment) instead of == (comparison). Find and fix it.
          starter_code: |
            password = "secret123"
            user_input = "secret123"
            if user_input = password:
                print("Access granted")
            else:
                print("Access denied")

        - id: ex_3_6
          name: Indentation Error
          skills: [syntax_errors, indentation]
          instructions: |
            The code below has indentation errors. Fix the indentation so the if/else block works correctly.
          starter_code: |
            score = 85
            if score >= 70:
            print("Pass")
            else:
            print("Fail")

        - id: ex_3_7
          name: Missing Colon
          skills: [syntax_errors, conditionals]
          instructions: |
            The code is missing colons at the end of the if/elif/else lines. Add them in the right places.
          starter_code: |
            x = 15
            if x > 10
                print("Big")
            elif x > 5
                print("Medium")
            else
                print("Small")

        - id: ex_3_8
          name: Logic Error
          skills: [boundary_conditions, comparison_operators]
          instructions: |
            The code should print "Adult" for ages 18 and above, but it currently treats 18-year-olds as minors. Fix the comparison operator.
          starter_code: |
            age = 18
            if age > 18:
                print("Adult")
            else:
                print("Minor")

        - id: ex_3_9
          name: Overlapping Conditions
          skills: [condition_ordering, logic_errors]
          instructions: |
            The grading system below never prints "B" or "C" because the conditions overlap. Fix the order or conditions so all grades are reachable.
          starter_code: |
            score = 85
            if score >= 60:
                print("D")
            elif score >= 70:
                print("C")
            elif score >= 80:
                print("B")
            elif score >= 90:
                print("A")

      independent_task:
        - id: ex_3_10
          name: Even or Odd
          skills: [modulo, conditionals]
          instructions: |
            Write a program that checks whether a number is even or odd.

            1. Create a variable with any integer
            2. Use the modulo operator (%) to check divisibility by 2
            3. Print "Even" or "Odd" accordingly
          starter_code: |
            # Even or odd checker

        - id: ex_3_11
          name: Sign Checker
          skills: [conditionals, comparison_operators]
          instructions: |
            Write a program that takes a number and prints whether it is positive, negative, or zero.

            Test it with the value -3.
          starter_code: |
            # Sign checker

        - id: ex_3_12
          name: Grade Calculator
          skills: [conditionals, multiple_branches]
          instructions: |
            Write a program that converts a numeric score (0-100) into a letter grade:
            - 90+: A
            - 80-89: B
            - 70-79: C
            - 60-69: D
            - Below 60: F

            Test with score = 78.
          starter_code: |
            # Grade calculator

        - id: ex_3_13
          name: Login Validator
          skills: [logical_operators, conditionals]
          instructions: |
            Write a program that checks a username and password.

            1. Set correct_username = "admin" and correct_password = "pass123"
            2. Set user_input and pass_input to test values
            3. Print "Login successful" only if both match, otherwise print "Invalid credentials"
          starter_code: |
